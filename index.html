<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Primary Meta -->
    <title>AURA — Rencontres d'exception</title>
    <meta name="description" content="La première app de rencontre où chaque connexion est authentique, vérifiée, et méritée. Accès à vie pour 14,99€. Disponible sur iOS et Android." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://aura-dating-three.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://aura-dating-three.vercel.app/" />
    <meta property="og:title"       content="AURA — Rencontres d'exception" />
    <meta property="og:description" content="La première app de rencontre authentique, vérifiée, et méritée. Accès à vie pour 14,99€." />
    <meta property="og:image"       content="https://aura-dating-three.vercel.app/og-image.svg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="fr_FR" />
    <meta property="og:site_name"   content="AURA Dating" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="AURA — Rencontres d'exception" />
    <meta name="twitter:description" content="La première app de rencontre authentique, vérifiée, et méritée." />
    <meta name="twitter:image"       content="https://aura-dating-three.vercel.app/og-image.svg" />

    <!-- Theme / Mobile -->
    <meta name="theme-color" content="#080810" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AURA" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "AURA Dating",
        "url": "https://aura-dating-three.vercel.app",
        "logo": "https://aura-dating-three.vercel.app/favicon.svg",
        "email": "contact@aura-dating.app",
        "description": "Application de rencontre premium avec vérification d'identité et score de compatibilité.",
        "foundingDate": "2025",
        "inLanguage": "fr-FR",
        "address": { "@type": "PostalAddress", "addressCountry": "FR" }
      },
      {
        "@context": "https://schema.org",
        "@type": "MobileApplication",
        "name": "AURA Dating",
        "url": "https://aura-dating-three.vercel.app",
        "description": "La première app de rencontre où chaque connexion est authentique, vérifiée, et méritée.",
        "applicationCategory": "SocialNetworkingApplication",
        "operatingSystem": "iOS 14+, Android 8+",
        "inLanguage": "fr-FR",
        "screenshot": "https://aura-dating-three.vercel.app/og-image.svg",
        "featureList": "Géolocalisation, Score de compatibilité, Vérification d'identité, Messagerie, Notifications push",
        "offers": {
          "@type": "Offer",
          "price": "14.99",
          "priceCurrency": "EUR",
          "description": "Accès à vie — paiement unique sans abonnement",
          "availability": "https://schema.org/InStock",
          "seller": { "@type": "Organization", "name": "AURA Dating" }
        }
      }
    ]
    </script>

    <!-- Preconnect for Google Fonts (performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts with display=swap -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
