<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g1" cx="80%" cy="50%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#8B1A4A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8B1A4A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="20%" cy="70%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080810"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Left decorative line -->
  <line x1="80" y1="100" x2="200" y2="100" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>

  <!-- Eyebrow -->
  <text x="80" y="160" font-family="Georgia,serif" font-size="14" letter-spacing="8" fill="#C9A84C" opacity="0.9" text-transform="uppercase">RENCONTRES D'EXCEPTION</text>

  <!-- ELARA main title -->
  <text x="72" y="310" font-family="Georgia,serif" font-size="160" font-weight="300" fill="#C9A84C" letter-spacing="20" font-style="italic">ELARA</text>

  <!-- Tagline -->
  <text x="82" y="370" font-family="Georgia,serif" font-size="22" font-style="italic" fill="rgba(245,240,232,0.65)" letter-spacing="3">« Révèle ton Elara. »</text>

  <!-- Description -->
  <text x="82" y="420" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="rgba(245,240,232,0.42)" letter-spacing="1">La première app de rencontre authentique, vérifiée et méritée.</text>

  <!-- Price badge -->
  <rect x="82" y="455" width="236" height="46" fill="#C9A84C"/>
  <text x="200" y="484" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#080810" text-anchor="middle" letter-spacing="3">ACCÈS À VIE — 14,99€</text>

  <!-- Right decorative circles -->
  <circle cx="980" cy="315" r="220" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.08"/>
  <circle cx="980" cy="315" r="160" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.06"/>
  <circle cx="980" cy="315" r="100" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.04"/>
  <text x="980" y="365" font-family="Georgia,serif" font-size="120" font-weight="300" font-style="italic" fill="#C9A84C" opacity="0.12" text-anchor="middle">A</text>

  <!-- Verified badge -->
  <text x="980" y="258" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#C9A84C" opacity="0.6" text-anchor="middle" letter-spacing="4">✦ ELARA Vérifié</text>

  <!-- Bottom URL -->
  <line x1="82" y1="555" x2="1120" y2="555" stroke="rgba(245,240,232,0.07)" stroke-width="1"/>
  <text x="82" y="580" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(245,240,232,0.25)" letter-spacing="2">elara-dating.vercel.app</text>
  <text x="1120" y="580" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(201,168,76,0.4)" letter-spacing="1" text-anchor="end">iOS · Android</text>
</svg>
